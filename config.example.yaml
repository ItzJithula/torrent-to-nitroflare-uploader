nitroflare:
  # Get your user hash from: https://nitroflare.net/user-hash
  api_key: "YOUR_NITROFLARE_USER_HASH_HERE"
  upload_timeout: 3600

gofile:
  # Get your API token from: https://gofile.io/myprofile
  # Leave empty to upload as a guest (a new public folder is created each time).
  api_token: "YOUR_GOFILE_API_TOKEN_HERE"
  upload_timeout: 3600
  # Upload region: auto, eu, na, sg, hk, jp, sa
  region: "auto"

torrent:
  download_dir: "./downloads"
  max_active_downloads: 3
  max_connections: 50
  max_uploads_per_torrent: 10
  upload_rate_limit: 0
  download_rate_limit: 0
  listen_ports:
    - 6881
    - 6882
    - 6883
  dht_enabled: true
  lsd_enabled: true
  upnp_enabled: true
  natpmp_enabled: true

# ---------------------------------------------------------------------------
# HTTP Downloader Settings (used by --http-only and colab_download.py)
# No libtorrent required — pure HTTP(S) streaming downloads.
# ---------------------------------------------------------------------------
http_downloader:
  # Timeout for each HTTP request in seconds
  timeout: 3600
  # Number of retry attempts on failure (enables resume via Range headers)
  retry_attempts: 3
  # Base delay (seconds) between retries (doubles each attempt)
  retry_delay: 5.0

# ---------------------------------------------------------------------------
# Torrent Resolver Settings
# Converts magnet links / .torrent files into direct HTTP(S) download URLs
# using an external service.  Only needed when you use --http-only with
# magnets or torrent files.
#
# Supported backends:
#   - none        : skip resolution (only direct URLs work)
#   - generic-api : send the source to a configurable HTTP endpoint
# ---------------------------------------------------------------------------
torrent_resolver:
  backend: "none"       # change to "generic-api" when you have a service
  # generic-api:
  #   endpoint: "https://your-resolver.example.com/convert"
  #   api_key: "your-api-key"
  #   param_name: "source"
  #   response_path: "data.files"
  #   timeout: 120

logging:
  level: "INFO"
  file: "torrent_uploader.log"
  max_size_mb: 10
  backup_count: 5
